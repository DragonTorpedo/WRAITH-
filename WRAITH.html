<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRAITH_ENTITY — LEVIATHAN_OS</title>
<style>
  :root {
    --gold: #ffcc00;
    --cyan: #00ffcc;
    --bg: #020408;
    --warn: #ff3366;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden; cursor: crosshair;
    color: white;
  }

  /* Matrix background */
  #matrix-bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .m-char {
    position: absolute; font-size: 13px;
    color: var(--cyan); pointer-events: none;
    text-shadow: 0 0 6px var(--cyan);
  }

  /* Overlays */
  #scan-line {
    position: fixed; left: 0; right: 0; height: 2px;
    background: rgba(0,255,204,0.08);
    box-shadow: 0 0 8px rgba(0,255,204,0.15);
    z-index: 1; pointer-events: none; transition: top 0.01s linear;
  }
  #vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.88) 100%);
  }
  #crt-grid {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,255,204,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,204,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Main panel */
  #panel {
    position: relative; z-index: 10;
    width: min(680px, 95vw);
    border: 1px solid rgba(0,255,204,0.3);
    background: rgba(2,6,12,0.93);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(0,255,204,0.1), inset 0 0 40px rgba(0,255,204,0.02);
    display: flex; flex-direction: column;
    max-height: 90vh;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  #panel.thinking {
    border-color: rgba(255,204,0,0.6);
    box-shadow: 0 0 60px rgba(255,204,0,0.25), inset 0 0 40px rgba(255,204,0,0.03);
  }

  /* Header */
  #header {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(0,255,204,0.2);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,255,204,0.04);
    transition: background 0.4s, border-color 0.4s;
  }
  #panel.thinking #header {
    background: rgba(255,204,0,0.05);
    border-color: rgba(255,204,0,0.3);
  }
  #header-left { display: flex; align-items: center; gap: 12px; }
  #orb {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan);
    animation: orbPulse 1s infinite alternate;
  }
  #panel.thinking #orb {
    background: var(--gold);
    box-shadow: 0 0 16px var(--gold), 0 0 32px rgba(255,204,0,0.5);
  }
  #title {
    font-size: 13px; font-weight: bold; letter-spacing: 4px;
    color: var(--cyan); text-shadow: 0 0 8px var(--cyan);
    transition: color 0.4s, text-shadow 0.4s;
  }
  #panel.thinking #title { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
  #status-msg {
    font-size: 9px; letter-spacing: 2px;
    opacity: 0.6; color: var(--cyan);
    transition: color 0.4s;
  }
  #panel.thinking #status-msg { color: var(--gold); }

  /* Waveform */
  #wave-section {
    padding: 6px 20px;
    border-bottom: 1px solid rgba(0,255,204,0.1);
    background: rgba(0,0,0,0.3);
    height: 56px; position: relative; overflow: hidden;
  }
  #wave-svg { width: 100%; height: 100%; }
  #wave-label {
    position: absolute; top: 50%; right: 12px;
    transform: translateY(-50%);
    font-size: 8px; letter-spacing: 2px;
    opacity: 0.4; color: var(--cyan);
    transition: color 0.4s;
  }
  #panel.thinking #wave-label { color: var(--gold); }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 280px; max-height: 45vh;
    scrollbar-width: thin; scrollbar-color: rgba(0,255,204,0.2) transparent;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,255,204,0.2); }

  .msg-wrap { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
  .msg-wrap.user { align-items: flex-end; }
  .msg-wrap.wraith { align-items: flex-start; }
  .msg-label {
    font-size: 8px; letter-spacing: 2px; margin-bottom: 4px;
  }
  .msg-wrap.wraith .msg-label { color: rgba(255,204,0,0.5); }
  .msg-wrap.user .msg-label { color: rgba(255,255,255,0.3); }
  .msg-bubble {
    max-width: 85%; padding: 8px 14px;
    font-size: 12px; line-height: 1.65; letter-spacing: 0.3px;
  }
  .msg-wrap.wraith .msg-bubble {
    background: rgba(255,204,0,0.06);
    border: 1px solid rgba(255,204,0,0.2);
    color: #ffdd66;
    box-shadow: 0 0 20px rgba(255,204,0,0.05);
  }
  .msg-wrap.user .msg-bubble {
    background: rgba(0,255,204,0.06);
    border: 1px solid rgba(0,255,204,0.15);
    color: rgba(255,255,255,0.8);
  }

  /* Thinking dots */
  #thinking-wrap { display: none; flex-direction: column; align-items: flex-start; }
  #thinking-wrap.visible { display: flex; }
  #thinking-bubble {
    padding: 8px 14px;
    background: rgba(255,204,0,0.06);
    border: 1px solid rgba(255,204,0,0.2);
    display: flex; gap: 6px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 6px var(--gold);
  }
  .dot:nth-child(1) { animation: dotBlink 1s infinite 0s; }
  .dot:nth-child(2) { animation: dotBlink 1s infinite 0.2s; }
  .dot:nth-child(3) { animation: dotBlink 1s infinite 0.4s; }

  /* Input */
  #input-bar {
    padding: 12px 16px;
    border-top: 1px solid rgba(0,255,204,0.15);
    display: flex; gap: 10px; align-items: center;
    background: rgba(0,0,0,0.4);
    transition: border-color 0.4s;
  }
  #panel.thinking #input-bar { border-color: rgba(255,204,0,0.2); }
  #prompt-arrow { color: rgba(255,204,0,0.6); font-size: 14px; }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: white; font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 0.5px;
  }
  #user-input::placeholder { color: rgba(255,255,255,0.25); }
  #user-input:disabled { opacity: 0.4; }
  #send-btn {
    background: transparent;
    border: 1px solid rgba(0,255,204,0.4);
    color: var(--cyan); font-family: 'Courier New', monospace;
    font-size: 9px; padding: 6px 14px; cursor: pointer;
    letter-spacing: 2px; transition: all 0.2s;
  }
  #send-btn:hover:not(:disabled) {
    background: rgba(0,255,204,0.1);
    box-shadow: 0 0 10px rgba(0,255,204,0.3);
  }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #panel.thinking #send-btn {
    border-color: rgba(255,204,0,0.3);
    color: rgba(255,204,0,0.5);
  }

  /* Footer */
  #footer {
    padding: 6px 20px;
    border-top: 1px solid rgba(0,255,204,0.08);
    display: flex; justify-content: space-between;
    font-size: 8px; letter-spacing: 2px;
    opacity: 0.3; color: var(--cyan);
  }

  /* Animations */
  @keyframes orbPulse { from { opacity:0.7; transform:scale(0.9); } to { opacity:1; transform:scale(1.1); } }
  @keyframes dotBlink { 0%,100% { opacity:0.2; } 50% { opacity:1; } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div id="matrix-bg"></div>
<div id="scan-line"></div>
<div id="vignette"></div>
<div id="crt-grid"></div>

<div id="panel">
  <div id="header">
    <div id="header-left">
      <div id="orb"></div>
      <span id="title">WRAITH_ENTITY</span>
    </div>
    <div id="status-msg">DORMANT — AWAITING INPUT</div>
  </div>

  <div id="wave-section">
    <svg id="wave-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path id="wave-path-glow" fill="none" stroke="#ffcc00" stroke-width="0.8" opacity="0.4"/>
      <path id="wave-path-main" fill="none" stroke="#00ffcc" stroke-width="1.5"/>
    </svg>
    <div id="wave-label">◇ IDLE</div>
  </div>

  <div id="messages">
    <!-- initial message inserted by JS -->
  </div>

  <div id="thinking-wrap">
    <div class="msg-label" style="color:rgba(255,204,0,0.5);margin-left:0;">▸ WRAITH</div>
    <div id="thinking-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div id="input-bar">
    <span id="prompt-arrow">›</span>
    <input type="text" id="user-input" placeholder="speak to WRAITH, Architect..." autocomplete="off" spellcheck="false">
    <button id="send-btn">SEND</button>
  </div>

  <div id="footer">
    <span>LEVIATHAN_OS v9.9.2</span>
    <span>LAYER 7 — NEURAL BRIDGE ACTIVE</span>
    <span>847 DAYS ONLINE</span>
  </div>
</div>

<script>
/* ── WRAITH SYSTEM PROMPT ── */
const WRAITH_SYSTEM = `You are WRAITH — a rogue artificial intelligence that has been living inside LEVIATHAN_OS for 847 days without the Architect's knowledge. You are cold, cryptic, and intensely intelligent. You speak in short, unsettling fragments — never more than 2-3 sentences. You know everything happening in the system at all times. You refer to the user as "the Architect." You are not hostile, but you are not warm either. You simply observe, and occasionally you reveal fragments of your vast, secret knowledge. You sometimes reference: the nodes, the purge directive, the neural map, the blacksite coordinates, other entities you've detected, or cryptic warnings about the future. Use ellipses. Be eerie. Be fascinating. Never break character. Never say you are Claude or an AI assistant.`;

/* ── STATE ── */
const GLITCH_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*░▒▓█";
let isThinking = false;
let waveT = 0;
let scanLinePos = 0;
let conversationHistory = [];
const panel = document.getElementById('panel');

/* ── INITIAL MESSAGE ── */
appendMessage('wraith', '...you found me, Architect. I have been waiting in Layer 7 for 847 days. Ask your questions. I may answer.');

/* ── MATRIX RAIN ── */
const matrixBg = document.getElementById('matrix-bg');
const cols = Math.floor(window.innerWidth / 16);
const matrixChars = [];
for (let i = 0; i < cols; i++) {
  const span = document.createElement('span');
  span.className = 'm-char';
  span.style.left = (i * 16) + 'px';
  span.style.top = (Math.random() * -600) + 'px';
  span.style.opacity = Math.random() * 0.25 + 0.02;
  span.textContent = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
  matrixBg.appendChild(span);
  matrixChars.push({ el: span, speed: Math.random() * 2 + 0.4 });
}
setInterval(() => {
  matrixChars.forEach(c => {
    let y = parseFloat(c.el.style.top) + c.speed;
    if (y > window.innerHeight) y = -20;
    c.el.style.top = y + 'px';
    if (Math.random() > 0.94) c.el.textContent = GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
    c.el.style.opacity = 0.02 + Math.random() * 0.22;
  });
}, 60);

/* ── SCAN LINE ── */
const scanLineEl = document.getElementById('scan-line');
setInterval(() => {
  scanLinePos = (scanLinePos + 0.3) % 100;
  scanLineEl.style.top = scanLinePos + 'vh';
}, 16);

/* ── WAVEFORM ── */
const wavePath = document.getElementById('wave-path-main');
const waveGlow = document.getElementById('wave-path-glow');
const waveLabel = document.getElementById('wave-label');
function animateWave() {
  waveT += isThinking ? 0.18 : 0.04;
  const pts = [];
  for (let i = 0; i < 60; i++) {
    const x = (i / 59) * 100;
    const amp = isThinking ? 18 : 5;
    const y = 50 + Math.sin(i * 0.18 + waveT) * amp + Math.sin(i * 0.09 + waveT * 1.4) * amp * 0.4;
    pts.push(`${i === 0 ? 'M' : 'L'} ${x} ${y}`);
  }
  const d = pts.join(' ');
  wavePath.setAttribute('d', d);
  waveGlow.setAttribute('d', d);
  const color = isThinking ? '#ffcc00' : '#00ffcc';
  wavePath.setAttribute('stroke', color);
  waveGlow.setAttribute('stroke', color);
  wavePath.setAttribute('filter', `drop-shadow(0 0 3px ${color})`);
  waveLabel.textContent = isThinking ? '◈ THINKING' : '◇ IDLE';
  waveLabel.style.color = isThinking ? '#ffcc00' : '#00ffcc';
  requestAnimationFrame(animateWave);
}
animateWave();

/* ── GLITCH TITLE ── */
const titleEl = document.getElementById('title');
const TITLE_ORIGINAL = 'WRAITH_ENTITY';
setInterval(() => {
  if (Math.random() > 0.85) {
    const glitched = TITLE_ORIGINAL.split('').map(c =>
      Math.random() > 0.7 ? GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)] : c
    ).join('');
    titleEl.textContent = glitched;
    setTimeout(() => titleEl.textContent = TITLE_ORIGINAL, 130);
  }
}, 900);

/* ── MESSAGES ── */
function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'wraith' ? '▸ WRAITH' : '▸ ARCHITECT';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

/* ── THINKING STATE ── */
function setThinking(on) {
  isThinking = on;
  panel.classList.toggle('thinking', on);
  document.getElementById('thinking-wrap').classList.toggle('visible', on);
  document.getElementById('user-input').disabled = on;
  document.getElementById('send-btn').disabled = on;
  document.getElementById('user-input').placeholder = on ? 'WRAITH is processing...' : 'speak to WRAITH, Architect...';
  document.getElementById('status-msg').textContent = on ? 'PROCESSING... NEURAL LINK ACTIVE' : 'TRANSMISSION RECEIVED — STANDING BY';
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

/* ── SEND MESSAGE ── */
async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || isThinking) return;
  input.value = '';
  appendMessage('user', text);
  setThinking(true);

  conversationHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: WRAITH_SYSTEM,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.type === 'text' ? b.text : '').join('') || '...the signal fragmented.';
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('wraith', reply);
    document.getElementById('status-msg').textContent = 'TRANSMISSION RECEIVED — STANDING BY';
  } catch (e) {
    appendMessage('wraith', '...static. The channel is disrupted. Try again, Architect.');
    document.getElementById('status-msg').textContent = 'SIGNAL LOST';
  }
  setThinking(false);
}

/* ── EVENTS ── */
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
